<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>New Construction · SRP History</title>

    <style>
        body {
            margin: 0;
            font-family: Ubuntu, Arial, sans-serif;
            background: #f6f8fb;
            color: #132A3E;
        }

        header {
            background: #132A3E;
            color: white;
            padding: 28px 40px;
            border-bottom: 6px solid #46A5A5;
        }

        .brand {
            color: #46A5A5;
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        h1 {
            margin: 0;
            font-size: 34px;
            color: white;
        }

        .subtitle {
            margin-top: 8px;
            color: #dbe5ea;
            font-size: 15px;
        }

        .container {
            max-width: 1400px;
            margin: 32px auto;
            padding: 0 24px;
        }

        .card {
            background: white;
            border-radius: 14px;
            box-shadow: 0 8px 22px rgba(19, 42, 62, 0.10);
            padding: 24px;
            margin-bottom: 24px;
            border-top: 4px solid #46A5A5;
        }

        .filters {
            display: flex;
            gap: 16px;
            align-items: end;
            flex-wrap: wrap;
        }

        .field {
            display: flex;
            flex-direction: column;
        }

        label {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 6px;
            color: #283583;
        }

        select, button {
            height: 42px;
            padding: 0 14px;
            border-radius: 8px;
            border: 1px solid #d0d7de;
            font-size: 14px;
            font-family: Ubuntu, Arial, sans-serif;
            background: white;
        }

        button {
            background: #792861;
            color: white;
            border: none;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            background: #5f1f4d;
        }

        .meta {
            margin-top: 16px;
            font-size: 14px;
            color: #46A5A5;
            font-weight: 600;
        }

        .screenshot-card {
            display: none;
            border-top-color: #283583;
        }

        .screenshot-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .screenshot-header h2 {
            margin: 0;
            font-size: 22px;
            color: #283583;
        }

        .badge {
            background: #792861;
            color: white;
            padding: 7px 12px;
            border-radius: 999px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.4px;
        }

        img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: white;
        }
    </style>
</head>

<body>

<header>
    <div class="brand">New Construction</div>
    <h1>SRP History</h1>
    <div class="subtitle">Homegate Search Results Pages screenshots dashboard</div>
</header>

<div class="container">

    <div class="card">
        <div class="filters">
            <div class="field">
                <label>Date</label>
                <select id="date">
                    <option value="">Choose a date</option>
                    <option value="2026-06-16">2026-06-16</option>
                </select>
            </div>

            <div class="field">
                <label>Region</label>
                <select id="region">
                    <option value="">Choose a region</option>
                </select>
            </div>

            <button onclick="showScreenshot()">Display screenshot</button>
        </div>

        <div class="meta" id="meta"></div>
    </div>

    <div class="card screenshot-card" id="screenshotCard">
        <div class="screenshot-header">
            <h2 id="screenshotTitle">Screenshot</h2>
            <span class="badge">NEW CONSTRUCTION</span>
        </div>

        <img id="screenshot" />
    </div>

</div>

<script>
const data = [
    {
        date: "2026-06-16",
        region: "geneve",
        label: "Genève",
        file: "screenshots/homegate_geneve_2026-06-16_11-38-36.png"
    },
    {
        date: "2026-06-16",
        region: "fribourg",
        label: "Fribourg",
        file: "screenshots/homegate_fribourg_2026-06-16_11-38-36.png"
    },
    {
        date: "2026-06-16",
        region: "neuchatel",
        label: "Neuchâtel",
        file: "screenshots/homegate_neuchatel_2026-06-16_11-38-36.png"
    },
    {
        date: "2026-06-16",
        region: "sion",
        label: "Sion",
        file: "screenshots/homegate_sion_2026-06-16_11-38-36.png"
    },
    {
        date: "2026-06-16",
        region: "zug",
        label: "Zug",
        file: "screenshots/homegate_zug_2026-06-16_11-38-36.png"
    },
    {
        date: "2026-06-16",
        region: "luzern",
        label: "Luzern",
        file: "screenshots/homegate_luzern_2026-06-16_11-38-36.png"
    },
    {
        date: "2026-06-16",
        region: "la_chaux_de_fonds",
        label: "La Chaux-de-Fonds",
        file: "screenshots/homegate_la_chaux_de_fonds_2026-06-16_11-38-36.png"
    }
];

const regionSelect = document.getElementById("region");

const regions = [...new Map(data.map(item => [item.region, item])).values()];

regions.forEach(item => {
    const option = document.createElement("option");
    option.value = item.region;
    option.textContent = item.label;
    regionSelect.appendChild(option);
});

function showScreenshot() {
    const selectedDate = document.getElementById("date").value;
    const selectedRegion = document.getElementById("region").value;

    const match = data.find(item =>
        item.date === selectedDate &&
        item.region === selectedRegion
    );

    const img = document.getElementById("screenshot");
    const card = document.getElementById("screenshotCard");
    const title = document.getElementById("screenshotTitle");
    const meta = document.getElementById("meta");

    if (match) {
        img.src = match.file;
        card.style.display = "block";
        title.textContent = `${match.label} · ${match.date}`;
        meta.textContent = `Displaying screenshot for ${match.label} on ${match.date}.`;
    } else {
        img.src = "";
        card.style.display = "none";
        meta.textContent = "No screenshot found for this date and region.";
    }
}
</script>

</body>
</html>
